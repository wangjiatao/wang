<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头狼质押解析 - 专业增强版</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-color: #667eea;
    --secondary-color: #764ba2;
    --success-color: #48bb78;
    --warning-color: #f6ad55;
    --error-color: #fc8181;
    --text-primary: #2d3748;
    --text-secondary: #718096;
    --bg-primary: #f7fafc;
    --bg-card: #ffffff;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.15);
    --shadow-xl: 0 20px 40px rgba(0,0,0,0.2);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.03"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.03"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.02"/><circle cx="10" cy="50" r="0.5" fill="white" opacity="0.02"/><circle cx="90" cy="30" r="0.5" fill="white" opacity="0.02"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
    pointer-events: none;
    z-index: 1;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
}

.header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeInDown 0.8s ease;
}

.header h1 {
    color: white;
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 10px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

.header h1 i {
    font-size: 2rem;
    animation: pulse 2s infinite;
}

.header p {
    color: rgba(255,255,255,0.9);
    font-size: 1.1rem;
    font-weight: 300;
}

.main-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 40px;
    box-shadow: var(--shadow-xl);
    backdrop-filter: blur(10px);
    animation: fadeInUp 0.8s ease;
    margin-bottom: 30px;
}

.shortcuts-hint {
    background: linear-gradient(135deg, #e6fffa, #b2f5ea);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    border-left: 4px solid var(--success-color);
    font-size: 0.9rem;
    color: #234e52;
}

.shortcuts-hint h4 {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.shortcuts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
    margin-top: 10px;
}

.shortcut-item {
    display: flex;
    align-items: center;
    gap: 8px;
}

.key {
    background: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-weight: 600;
    border: 1px solid #cbd5e0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.date-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.date-input-group {
    position: relative;
}

.date-input-group label {
    display: block;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.date-input-group label i {
    color: var(--primary-color);
    font-size: 0.8rem;
}

.date-input-group input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 500;
    transition: all 0.3s ease;
    background: var(--bg-primary);
}

.date-input-group input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    transform: translateY(-2px);
}

.input-section {
    margin-bottom: 30px;
}

.input-section label {
    display: block;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.input-section label i {
    color: var(--primary-color);
    font-size: 0.8rem;
}

#input {
    width: 100%;
    min-height: 200px;
    padding: 15px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Consolas', 'Monaco', monospace;
    resize: vertical;
    transition: all 0.3s ease;
    background: var(--bg-primary);
}

#input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    transform: translateY(-2px);
}

.file-section {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.file-input-wrapper {
    position: relative;
    overflow: hidden;
    display: inline-block;
}

.file-input-wrapper input[type=file] {
    position: absolute;
    left: -9999px;
}

.button-group {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    text-transform: none;
    letter-spacing: 0.5px;
}

.btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.btn:active::before {
    width: 300px;
    height: 300px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.btn-secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 2px solid var(--border-color);
}

.btn-secondary:hover {
    background: white;
    border-color: var(--primary-color);
    color: var(--primary-color);
    transform: translateY(-2px);
}

.btn-success {
    background: linear-gradient(135deg, var(--success-color), #38a169);
    color: white;
    box-shadow: 0 4px 15px rgba(72, 187, 120, 0.3);
}

.btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(72, 187, 120, 0.4);
}

.btn-danger {
    background: linear-gradient(135deg, var(--error-color), #f56565);
    color: white;
    box-shadow: 0 4px 15px rgba(252, 129, 129, 0.3);
}

.btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(252, 129, 129, 0.4);
}

.btn.loading {
    opacity: 0.7;
    pointer-events: none;
    transform: none !important;
}

.btn.loading i {
    animation: spin 1s linear infinite;
}

.status-section {
    margin-bottom: 20px;
    min-height: 40px;
}

.status-message {
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
}

.status-success {
    background: linear-gradient(135deg, #c6f6d5, #9ae6b4);
    color: #22543d;
    border-left: 4px solid var(--success-color);
}

.status-warning {
    background: linear-gradient(135deg, #feebc8, #fbd38d);
    color: #744210;
    border-left: 4px solid var(--warning-color);
}

.status-error {
    background: linear-gradient(135deg, #fed7d7, #feb2b2);
    color: #742a2a;
    border-left: 4px solid var(--error-color);
}

.status-info {
    background: linear-gradient(135deg, #bee3f8, #90cdf4);
    color: #2c5282;
    border-left: 4px solid var(--primary-color);
}

.result-section {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 30px;
    box-shadow: var(--shadow-lg);
    animation: fadeInUp 0.5s ease;
    margin-bottom: 30px;
}

.result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border-color);
}

.result-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
}

.result-stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 15px;
    background: var(--bg-primary);
    border-radius: 10px;
    min-width: 80px;
}

.stat-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--primary-color);
}

.stat-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 2px;
}

.result-items {
    max-height: 500px;
    overflow-y: auto;
    padding-right: 10px;
}

.result-items::-webkit-scrollbar {
    width: 8px;
}

.result-items::-webkit-scrollbar-track {
    background: var(--bg-primary);
    border-radius: 10px;
}

.result-items::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    border-radius: 10px;
}

.result-item {
    background: var(--bg-primary);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    border-left: 4px solid var(--primary-color);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.result-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    transform: scaleX(0);
    transition: transform 0.3s ease;
}

.result-item:hover::before {
    transform: scaleX(1);
}

.result-item:hover {
    transform: translateX(5px);
    box-shadow: var(--shadow-md);
}

.result-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.result-item-title {
    font-weight: 600;
    color: var(--text-primary);
    font-size: 0.9rem;
}

.result-item-address {
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.85rem;
    color: var(--text-secondary);
    background: white;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    word-break: break-all;
}

.result-item-info {
    display: flex;
    gap: 15px;
    margin-top: 10px;
    flex-wrap: wrap;
}

.info-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: white;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    border: 1px solid var(--border-color);
}

.info-badge.type {
    background: linear-gradient(135deg, #e6fffa, #b2f5ea);
    color: #234e52;
    border-color: #81e6d9;
}

.info-badge.amount {
    background: linear-gradient(135deg, #fef5e7, #fdeaa7);
    color: #744210;
    border-color: #f6ad55;
}

.result-item-link {
    margin-top: 10px;
}

.result-item-link a {
    color: var(--primary-color);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.3s ease;
}

.result-item-link a:hover {
    color: var(--secondary-color);
    transform: translateX(3px);
}

.warning-box {
    background: linear-gradient(135deg, #fff5f5, #fed7d7);
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
    border-left: 4px solid var(--error-color);
}

.warning-title {
    font-weight: 600;
    color: var(--error-color);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.warning-item {
    padding: 8px 0;
    color: #742a2a;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(252, 129, 129, 0.2);
}

.warning-item:last-child {
    border-bottom: none;
}

.error-count {
    background: linear-gradient(135deg, var(--error-color), #f56565);
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    animation: pulse 2s infinite;
}

/* 图表区域 */
.charts-section {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 30px;
    box-shadow: var(--shadow-lg);
    animation: fadeInUp 0.5s ease;
    margin-bottom: 30px;
}

.charts-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border-color);
}

.charts-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
}

.charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 30px;
    margin-bottom: 20px;
}

.chart-container {
    background: var(--bg-primary);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;
}

.chart-container:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
}

.chart-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.chart-canvas {
    max-height: 300px;
}

/* 动画 */
@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes pulse {
    0%, 100% {
        opacity: 1;
    }
    50% {
        opacity: 0.7;
    }
}

@keyframes spin {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

/* 响应式设计 */
@media (max-width: 768px) {
    .container {
        padding: 10px;
    }
    
    .header h1 {
        font-size: 2rem;
    }
    
    .main-card {
        padding: 20px;
    }
    
    .button-group {
        flex-direction: column;
    }
    
    .btn {
        width: 100%;
        justify-content: center;
    }
    
    .result-header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
    }
    
    .date-section {
        grid-template-columns: 1fr;
    }
    
    .charts-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 480px) {
    .header h1 {
        font-size: 1.5rem;
    }
    
    .main-card {
        padding: 15px;
    }
    
    .result-section,
    .charts-section {
        padding: 20px;
    }
}

/* 暗色主题支持 */
@media (prefers-color-scheme: dark) {
    :root {
        --bg-primary: #1a202c;
        --bg-card: #2d3748;
        --text-primary: #f7fafc;
        --text-secondary: #cbd5e0;
        --border-color: #4a5568;
    }
    
    body {
        background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
    }
    
    #input,
    .date-input-group input {
        background: #1a202c;
        color: #f7fafc;
    }
    
    .result-item,
    .info-badge,
    .result-item-address,
    .chart-container {
        background: #1a202c;
        color: #f7fafc;
    }
}
</style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>
            <i class="fas fa-chart-line"></i>
            头狼质押解析系统
        </h1>
        <p>专业增强版 - 智能数据解析与分析</p>
    </header>

    <main class="main-card">
        <div class="shortcuts-hint">
            <h4><i class="fas fa-keyboard"></i> 快捷键指南</h4>
            <div class="shortcuts-grid">
                <div class="shortcut-item">
                    <span class="key">Ctrl+V</span> 粘贴数据
                </div>
                <div class="shortcut-item">
                    <span class="key">Ctrl+Enter</span> 生成结果
                </div>
                <div class="shortcut-item">
                    <span class="key">Ctrl+C</span> 复制结果
                </div>
                <div class="shortcut-item">
                    <span class="key">Ctrl+O</span> 打开文件
                </div>
                <div class="shortcut-item">
                    <span class="key">Ctrl+S</span> 保存结果
                </div>
                <div class="shortcut-item">
                    <span class="key">Ctrl+L</span> 清空数据
                </div>
            </div>
        </div>

        <section class="date-section">
            <div class="date-input-group">
                <label for="year">
                    <i class="fas fa-calendar-alt"></i>
                    年份
                </label>
                <input type="number" id="year" value="2026" maxlength="4" placeholder="2026" min="2020" max="2030">
            </div>
            <div class="date-input-group">
                <label for="month">
                    <i class="fas fa-calendar"></i>
                    月份
                </label>
                <input type="number" id="month" value="3" maxlength="2" placeholder="1-12" min="1" max="12">
            </div>
            <div class="date-input-group">
                <label for="day">
                    <i class="fas fa-calendar-day"></i>
                    日期
                </label>
                <input type="number" id="day" value="19" maxlength="2" placeholder="1-31" min="1" max="31">
            </div>
        </section>

        <section class="input-section">
            <label for="input">
                <i class="fas fa-database"></i>
                数据输入区域
            </label>
            <textarea id="input" placeholder="请粘贴要解析的质押数据...&​#10;&​#10;支持格式：&​#10;• 钱包地址：0x...&​#10;• 质押类型：活期、240天、360天、600天&​#10;• 金额格式：2849DAI、DAI2849、2849D"></textarea>
        </section>

        <section class="file-section">
            <div class="file-input-wrapper">
                <button class="btn btn-secondary">
                    <i class="fas fa-file-import"></i>
                    导入文件
                </button>
                <input type="file" id="fileInput" accept=".txt,.csv,.json">
            </div>
            <button class="btn btn-success" onclick="exportToCSV()">
                <i class="fas fa-file-export"></i>
                导出CSV
            </button>
            <button class="btn btn-success" onclick="exportToJSON()">
                <i class="fas fa-file-code"></i>
                导出JSON
            </button>
        </section>

        <section class="button-group">
            <button class="btn btn-primary" onclick="run()" id="runBtn">
                <i class="fas fa-play"></i>
                生成结果
            </button>
            <button class="btn btn-secondary" onclick="copyResult()">
                <i class="fas fa-copy"></i>
                复制结果
            </button>
            <button class="btn btn-secondary" onclick="generateCharts()">
                <i class="fas fa-chart-pie"></i>
                生成图表
            </button>
            <button class="btn btn-danger" onclick="clearAll()">
                <i class="fas fa-trash"></i>
                清空数据
            </button>
        </section>

        <section class="status-section">
            <div id="status"></div>
        </section>
    </main>

    <section class="result-section" id="resultSection" style="display: none;">
        <div id="output"></div>
        <div id="warnBox"></div>
    </section>

    <section class="charts-section" id="chartsSection" style="display: none;">
        <div class="charts-header">
            <div class="charts-title">
                <i class="fas fa-chart-bar"></i>
                数据分析图表
            </div>
        </div>
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-chart-pie"></i>
                    质押类型分布
                </div>
                <canvas id="typeChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-chart-bar"></i>
                    金额区间统计
                </div>
                <canvas id="amountChart" class="chart-canvas"></canvas>
            </div>
        </div>
    </section>
</div>

<script>
let cleanText = "";
let parsedData = [];
let charts = {};

// 🔥 数据清洗（增强错误处理）
function normalize(t){
  try {
    if (!t || typeof t !== 'string') {
      throw new Error('输入数据无效');
    }
    
    return t
    .replace(/DAl|DA1|dai/gi,"DAI")
    .replace(/债劵|动债券/g,"债券")
    .replace(/活期币/g,"活期")
    .replace(/长期质押/g,"长期")
    .replace(/[【\[]/g,"（")
    .replace(/[】\]]/g,"）")
    .replace(/0X/g,"0x")
    .replace(/(0x[a-fA-F0-9]{40})/g,"\n$1");
  } catch (error) {
    console.error('数据清洗错误:', error);
    return '';
  }
}

// 🔥 地址修复（增强验证）
function fixAddr(addr){
  try {
    if (!addr || typeof addr !== 'string') {
      return null;
    }
    
    addr = addr.replace(/\s/g,"").toLowerCase();
    
    // 更严格的地址验证
    if(!addr.startsWith("0x")) return null;
    if(addr.length!==42) return null;
    
    // 验证是否为有效的十六进制地址
    const hexPattern = /^0x[a-f0-9]{40}$/;
    if (!hexPattern.test(addr)) return null;
    
    return addr;
  } catch (error) {
    console.error('地址处理错误:', error);
    return null;
  }
}

// 🔥 类型识别（增强错误处理）
function detectType(t){
  try {
    if (!t || typeof t !== 'string') {
      return "未知";
    }
    
    t = t.replace(/\s+/g,"");
    
    // 按优先级匹配，避免误匹配
    if(/活期/.test(t)) return "活期";
    if(/600天|长期/.test(t)) return "600天";
    if(/360天|债券/.test(t)) return "360天";
    if(/240天|定期/.test(t)) return "240天";
    
    return "未知";
  } catch (error) {
    console.error('类型识别错误:', error);
    return "未知";
  }
}

// 🔥 金额识别（增强错误处理）
function detectAmount(t){
  try {
    if (!t || typeof t !== 'string') {
      return 0;
    }
    
    t = t.toUpperCase();

    // ✅ 1. 2849DAI / 2849D
    let m1 = [...t.matchAll(/(\d+(\.\d+)?)\s*(DAI|D)\b/g)];
    if(m1.length){
      const amount = parseFloat(m1[m1.length-1][1]);
      if (isNaN(amount) || amount < 0) return 0;
      return Number(amount.toFixed(2));
    }

    // ✅ 2. DAI2849
    let m2 = [...t.matchAll(/\b(DAI|D)\s*(\d+(\.\d+)?)/g)];
    if(m2.length){
      const amount = parseFloat(m2[m2.length-1][2]);
      if (isNaN(amount) || amount < 0) return 0;
      return Number(amount.toFixed(2));
    }

    // ❌ 有DAI但没数字 → 0
    if(/DAI/.test(t)){
      return 0;
    }

    return 0;
  } catch (error) {
    console.error('金额识别错误:', error);
    return 0;
  }
}

// 🔥 日期验证
function validateDate(year, month, day) {
  const errors = [];
  
  // 验证年份
  const yearNum = parseInt(year);
  if (isNaN(yearNum) || yearNum < 2020 || yearNum > 2030) {
    errors.push('年份无效 (请输入2020-2030)');
  }
  
  // 验证月份
  const monthNum = parseInt(month);
  if (isNaN(monthNum) || monthNum < 1 || monthNum > 12) {
    errors.push('月份无效 (请输入1-12)');
  }
  
  // 验证日期
  const dayNum = parseInt(day);
  if (isNaN(dayNum) || dayNum < 1 || dayNum > 31) {
    errors.push('日期无效 (请输入1-31)');
  }
  
  // 验证日期组合
  if (errors.length === 0) {
    const date = new Date(yearNum, monthNum - 1, dayNum);
    if (date.getFullYear() !== yearNum || 
        date.getMonth() !== monthNum - 1 || 
        date.getDate() !== dayNum) {
      errors.push('日期组合无效');
    }
  }
  
  return errors;
}

// 🔥 显示状态信息（更新为新的样式）
function showStatus(message, type = 'info') {
  const statusEl = document.getElementById('status');
  const className = `status-${type}`;
  const icon = type === 'error' ? 'fas fa-exclamation-circle' : 
               type === 'success' ? 'fas fa-check-circle' : 
               type === 'warn' ? 'fas fa-exclamation-triangle' : 
               'fas fa-info-circle';
  
  statusEl.innerHTML = `
    <div class="status-message ${className}">
      <i class="${icon}"></i>
      <span>${message}</span>
    </div>
  `;
  
  // 3秒后自动清除成功消息
  if (type === 'success') {
    setTimeout(() => {
      statusEl.innerHTML = '';
    }, 3000);
  }
}

// 🔥 主逻辑（增强错误处理，更新HTML输出）
function run(){
  try {
    // 重置状态
    showStatus('正在处理数据...', 'info');
    document.getElementById('runBtn').classList.add('loading');
    
    // 验证日期
    const dateErrors = validateDate(
      document.getElementById('year').value,
      document.getElementById('month').value,
      document.getElementById('day').value
    );
    
    if (dateErrors.length > 0) {
      showStatus('日期错误: ' + dateErrors.join(', '), 'error');
      return;
    }
    
    // 验证输入
    if (!input.value || input.value.trim().length === 0) {
      showStatus('请输入要解析的数据', 'error');
      return;
    }
    
    let text = normalize(input.value);
    if (!text) {
      showStatus('数据清洗失败，请检查输入格式', 'error');
      return;
    }
    
    let list = [...text.matchAll(/0x[a-fA-F0-9]{30,50}/g)];
    
    if (list.length === 0) {
      showStatus('未找到有效的钱包地址，请检查数据格式', 'warn');
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('chartsSection').style.display = 'none';
      output.innerHTML = '';
      warnBox.innerHTML = '';
      cleanText = "";
      parsedData = [];
      return;
    }

    let seen = new Set();
    let html = "";
    let warn = "";
    let clean = "";
    let total = 0;
    let errorCount = 0;
    let successCount = 0;
    parsedData = [];

    list.forEach((m, i) => {
      try {
        let raw = m[0];
        let addr = fixAddr(raw);

        let start = m.index;
        let end = list[i+1] ? list[i+1].index : text.length;
        let block = text.slice(start, end);

        let type = detectType(block);
        let dai = detectAmount(block);

        let key = (addr || 'null') + "_" + dai;
        if(seen.has(key)) return;
        seen.add(key);

        let errorMsg = "";
        if(!addr) errorMsg += "地址异常 ";
        if(dai === 0) errorMsg += "未识别金额 ";
        if(type === "未知") errorMsg += "类型异常 ";

        if(errorMsg){
          warn += `⚠️ 第${seen.size}条异常：${errorMsg}<br>`;
          errorCount++;
        } else {
          successCount++;
        }

        // 只统计有效金额
        if(dai > 0 && !isNaN(dai)){
          total += dai;
        }

        let url = addr ? `https://www.oklink.com/zh-hans/polygon/address/${addr}/token-transfer` : "#";

        // 保存解析数据用于图表
        parsedData.push({
          index: seen.size,
          address: addr || '异常地址',
          type: type,
          amount: dai,
          isValid: !errorMsg
        });

        // 更新HTML输出样式
        html += `
        <div class="result-item">
          <div class="result-item-header">
            <div class="result-item-title">
              <i class="fas fa-wallet"></i>
              质押地址 #${seen.size}
            </div>
          </div>
          <div class="result-item-address">${addr || '异常地址'}</div>
          <div class="result-item-info">
            <span class="info-badge type">
              <i class="fas fa-tag"></i>
              ${type}
            </span>
            <span class="info-badge amount">
              <i class="fas fa-coins"></i>
              ${dai.toFixed(2)} DAI
            </span>
          </div>
          ${addr ? `
          <div class="result-item-link">
            <a href="${url}" target="_blank">
              <i class="fas fa-external-link-alt"></i>
              查看区块链详情
            </a>
          </div>
          ` : ''}
          ${errorMsg ? `<div style="color: var(--error-color); font-size: 0.85rem; margin-top: 10px;">
            <i class="fas fa-exclamation-triangle"></i>
            ${errorMsg}
          </div>` : ''}
        </div>
        `;

        clean += `质押地址${seen.size}:
地址：${addr || '异常地址'}（${type}，${dai.toFixed(2)} Dai）

`;
      } catch (itemError) {
        console.error(`处理第${i+1}条数据时出错:`, itemError);
        warn += `⚠️ 第${i+1}条处理失败：${itemError.message}<br>`;
        errorCount++;
      }
    });

    total = Number(total.toFixed(2));

    // 构建结果标题
    let titleHtml = `
      <div class="result-header">
        <div class="result-title">
          <i class="fas fa-chart-bar"></i>
          ${year.value}年 ${month.value}月 ${day.value}日 头狼体系质押明细
          ${errorCount > 0 ? `<span class="error-count">${errorCount}个错误</span>` : ''}
        </div>
        <div class="result-stats">
          <div class="stat-item">
            <div class="stat-value">${total}</div>
            <div class="stat-label">总业绩</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${successCount}</div>
            <div class="stat-label">成功</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${errorCount}</div>
            <div class="stat-label">异常</div>
          </div>
        </div>
      </div>
    `;

    output.innerHTML = `
      ${titleHtml}
      <div class="result-items">
        ${html}
      </div>
    `;

    warnBox.innerHTML = warn ? `
      <div class="warning-box">
        <div class="warning-title">
          <i class="fas fa-exclamation-triangle"></i>
          异常汇总
        </div>
        ${warn.split('<br>').filter(item => item.trim()).map(item => 
          `<div class="warning-item">${item.replace(/⚠️/g, '<i class="fas fa-exclamation-triangle"></i>')}</div>`
        ).join('')}
      </div>
    ` : "";

    cleanText = `${year.value}年 ${month.value}月 ${day.value}日 头狼体系质押明细  

总业绩：${total}
成功解析：${successCount}条，异常：${errorCount}条

${clean}`;

    // 显示结果区域
    document.getElementById('resultSection').style.display = 'block';

    // 显示处理结果
    if (errorCount === 0) {
      showStatus(`✅ 成功解析 ${successCount} 条数据`, 'success');
    } else {
      showStatus(`⚠️ 解析完成：成功 ${successCount} 条，异常 ${errorCount} 条`, 'warn');
    }
    
  } catch (error) {
    console.error('主处理流程错误:', error);
    showStatus('❌ 处理失败：' + error.message, 'error');
    output.innerHTML = `<div class="status-message status-error">
      <i class="fas fa-exclamation-circle"></i>
      处理失败：${error.message}
    </div>`;
    document.getElementById('resultSection').style.display = 'block';
  } finally {
    document.getElementById('runBtn').classList.remove('loading');
  }
}

// 🔥 生成图表
function generateCharts() {
  try {
    if (parsedData.length === 0) {
      showStatus('请先生成结果数据', 'warn');
      return;
    }

    showStatus('正在生成图表...', 'info');
    
    // 销毁旧图表
    Object.values(charts).forEach(chart => {
      if (chart) chart.destroy();
    });

    // 质押类型分布饼图
    const typeData = {};
    parsedData.forEach(item => {
      if (item.isValid) {
        typeData[item.type] = (typeData[item.type] || 0) + 1;
      }
    });

    const typeCtx = document.getElementById('typeChart').getContext('2d');
    charts.type = new Chart(typeCtx, {
      type: 'pie',
      data: {
        labels: Object.keys(typeData),
        datasets: [{
          data: Object.values(typeData),
          backgroundColor: [
            '#667eea',
            '#764ba2',
            '#48bb78',
            '#f6ad55',
            '#fc8181'
          ],
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              padding: 15,
              font: {
                size: 12
              }
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const label = context.label || '';
                const value = context.parsed || 0;
                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                const percentage = ((value / total) * 100).toFixed(1);
                return `${label}: ${value} (${percentage}%)`;
              }
            }
          }
        }
      }
    });

    // 金额区间统计柱状图
    const amountRanges = {
      '0-1000': 0,
      '1000-5000': 0,
      '5000-10000': 0,
      '10000-50000': 0,
      '50000+': 0
    };

    parsedData.forEach(item => {
      if (item.isValid && item.amount > 0) {
        if (item.amount <= 1000) amountRanges['0-1000']++;
        else if (item.amount <= 5000) amountRanges['1000-5000']++;
        else if (item.amount <= 10000) amountRanges['5000-10000']++;
        else if (item.amount <= 50000) amountRanges['10000-50000']++;
        else amountRanges['50000+']++;
      }
    });

    const amountCtx = document.getElementById('amountChart').getContext('2d');
    charts.amount = new Chart(amountCtx, {
      type: 'bar',
      data: {
        labels: Object.keys(amountRanges),
        datasets: [{
          label: '质押数量',
          data: Object.values(amountRanges),
          backgroundColor: 'rgba(102, 126, 234, 0.8)',
          borderColor: 'rgba(102, 126, 234, 1)',
          borderWidth: 2,
          borderRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return `数量: ${context.parsed.y}`;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 1
            }
          }
        }
      }
    });

    document.getElementById('chartsSection').style.display = 'block';
    showStatus('✅ 图表生成成功', 'success');
    
  } catch (error) {
    console.error('图表生成错误:', error);
    showStatus('❌ 图表生成失败：' + error.message, 'error');
  }
}

// 🔥 文件导入功能
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const content = event.target.result;
      document.getElementById('input').value = content;
      showStatus(`✅ 文件 "${file.name}" 导入成功`, 'success');
    } catch (error) {
      console.error('文件读取错误:', error);
      showStatus('❌ 文件读取失败', 'error');
    }
  };
  reader.readAsText(file);
});

// 🔥 导出CSV功能
function exportToCSV() {
  try {
    if (parsedData.length === 0) {
      showStatus('请先生成结果数据', 'warn');
      return;
    }

    let csv = 'Index,Address,Type,Amount,IsValid\n';
    parsedData.forEach(item => {
      csv += `${item.index},"${item.address}","${item.type}",${item.amount},${item.isValid}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `质押数据_${year.value}${month.value}${day.value}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    showStatus('✅ CSV文件导出成功', 'success');
  } catch (error) {
    console.error('CSV导出错误:', error);
    showStatus('❌ CSV导出失败', 'error');
  }
}

// 🔥 导出JSON功能
function exportToJSON() {
  try {
    if (parsedData.length === 0) {
      showStatus('请先生成结果数据', 'warn');
      return;
    }

    const jsonData = {
      date: `${year.value}-${month.value}-${day.value}`,
      total: parsedData.reduce((sum, item) => sum + (item.isValid ? item.amount : 0), 0),
      successCount: parsedData.filter(item => item.isValid).length,
      errorCount: parsedData.filter(item => !item.isValid).length,
      data: parsedData
    };

    const blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `质押数据_${year.value}${month.value}${day.value}.json`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    showStatus('✅ JSON文件导出成功', 'success');
  } catch (error) {
    console.error('JSON导出错误:', error);
    showStatus('❌ JSON导出失败', 'error');
  }
}

// 🔥 复制（增强错误处理）
function copyResult(){
  try {
    if(!cleanText || cleanText.trim().length === 0) {
      showStatus('请先生成结果', 'warn');
      return;
    }
    
    navigator.clipboard.writeText(cleanText).then(() => {
      showStatus('✅ 已复制到剪贴板', 'success');
    }).catch(err => {
      console.error('复制失败:', err);
      showStatus('❌ 复制失败，请手动复制', 'error');
    });
  } catch (error) {
    console.error('复制功能错误:', error);
    showStatus('❌ 复制功能异常', 'error');
  }
}

// 🔥 清空（增强错误处理）
function clearAll(){
  try {
    input.value = "";
    output.innerHTML = "";
    warnBox.innerHTML = "";
    cleanText = "";
    document.getElementById('status').innerHTML = "";
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('chartsSection').style.display = 'none';
    parsedData = [];
    
    // 销毁图表
    Object.values(charts).forEach(chart => {
      if (chart) chart.destroy();
    });
    charts = {};
    
    // 重置日期为当前日期
    const now = new Date();
    document.getElementById('year').value = now.getFullYear();
    document.getElementById('month').value = now.getMonth() + 1;
    document.getElementById('day').value = now.getDate();
    
    showStatus('✅ 已清空所有数据', 'success');
  } catch (error) {
    console.error('清空功能错误:', error);
    showStatus('❌ 清空失败', 'error');
  }
}

// 🔥 快捷键支持
document.addEventListener('keydown', function(e) {
  // Ctrl+V: 粘贴
  if (e.ctrlKey && e.key === 'v') {
    const inputEl = document.getElementById('input');
    if (document.activeElement !== inputEl) {
      e.preventDefault();
      inputEl.focus();
      // 触发粘贴事件
      navigator.clipboard.readText().then(text => {
        inputEl.value = text;
        showStatus('✅ 数据已粘贴', 'success');
      }).catch(() => {
        showStatus('⚠️ 无法访问剪贴板，请手动粘贴', 'warn');
      });
    }
  }
  
  // Ctrl+Enter: 生成结果
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
  
  // Ctrl+C: 复制结果
  if (e.ctrlKey && e.key === 'c' && !window.getSelection().toString()) {
    e.preventDefault();
    copyResult();
  }
  
  // Ctrl+O: 打开文件
  if (e.ctrlKey && e.key === 'o') {
    e.preventDefault();
    document.getElementById('fileInput').click();
  }
  
  // Ctrl+S: 保存结果
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    exportToCSV();
  }
  
  // Ctrl+L: 清空数据
  if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    clearAll();
  }
});

// 🔥 页面加载完成后的初始化
document.addEventListener('DOMContentLoaded', function() {
  // 设置当前日期
  const now = new Date();
  document.getElementById('year').value = now.getFullYear();
  document.getElementById('month').value = now.getMonth() + 1;
  document.getElementById('day').value = now.getDate();
  
  // 添加输入框回车事件
  ['year', 'month', 'day'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        run();
      }
    });
  });
  
  showStatus('✅ 系统就绪，支持快捷键操作', 'success');
});

// 🔥 添加全局错误处理
window.addEventListener('error', function(event) {
  console.error('全局错误:', event.error);
  showStatus('❌ 系统错误，请刷新页面重试', 'error');
});

window.addEventListener('unhandledrejection', function(event) {
  console.error('未处理的Promise错误:', event.reason);
  showStatus('❌ 系统异常，请刷新页面重试', 'error');
});
</script>
